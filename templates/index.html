<!DOCTYPE html>
<html>
<head>
    <title>Nokia Latency Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #0a0a0f;
            color: #00d4ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        h1 {
            font-size: 2em;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.8em;
            letter-spacing: 6px;
            color: #005f7a;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .card {
            background: #0d1117;
            border: 1px solid #00d4ff22;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px #00d4ff11;
        }

        .card h2 {
            font-size: 0.75em;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #005f7a;
            margin-bottom: 20px;
        }

        .slider-row {
            margin-bottom: 20px;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
            letter-spacing: 2px;
        }

        .slider-value {
            color: #00d4ff;
            font-weight: bold;
        }

        input[type=range] {
            width: 100%;
            appearance: none;
            height: 4px;
            background: #00d4ff33;
            border-radius: 2px;
            outline: none;
        }

        input[type=range]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            box-shadow: 0 0 10px #00d4ff;
        }

        .status-box {
            background: #0d1117;
            border: 1px solid #00d4ff22;
            border-radius: 12px;
            padding: 20px;
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .status-item {
            text-align: center;
        }

        .status-item .val {
            font-size: 1.8em;
            font-weight: bold;
            color: #00d4ff;
        }

        .status-item .label {
            font-size: 0.65em;
            letter-spacing: 3px;
            color: #005f7a;
            text-transform: uppercase;
        }

        .mode-badge {
            font-size: 0.7em;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #005f7a;
            margin-bottom: 30px;
        }

        .mode-badge span {
            color: #00d4ff;
        }

        #gyro-status {
            font-size: 0.75em;
            color: #005f7a;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .graph-card {
            background: #0d1117;
            border: 1px solid #00d4ff22;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px #00d4ff11;
        }

        .graph-card h2 {
            font-size: 0.75em;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #005f7a;
            margin-bottom: 20px;
        }

        /* --- Nokia-style button used across AI setup and AI mode --- */
        .nokia-btn {
            background: #00d4ff22;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 2px;
            font-size: 0.75em;
            text-transform: uppercase;
            font-family: inherit;
            transition: background 0.15s;
        }
        .nokia-btn:hover { background: #00d4ff33; }
        .nokia-btn.active {
            background: #00d4ff;
            color: #0a0a0f;
            box-shadow: 0 0 15px #00d4ff88;
        }
        .nokia-btn.secondary {
            border-color: #005f7a;
            color: #005f7a;
        }
        .nokia-btn.secondary:hover { background: #00d4ff11; }

        /* --- Camera feed container with click-overlay canvas --- */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }
        .video-container img,
        .video-container canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
        }
        .video-container canvas {
            pointer-events: none;
        }
        .video-container.picking canvas {
            pointer-events: auto;
            cursor: crosshair;
        }

        /* --- AI setup card layout --- */
        .setup-status {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 0.75em;
            letter-spacing: 2px;
            color: #005f7a;
        }
        .setup-status .val {
            color: #00d4ff;
            margin-left: 6px;
        }
        .setup-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }
        .setup-buttons .nokia-btn { flex: 1 1 auto; }
        #planMsg {
            font-size: 0.75em;
            letter-spacing: 2px;
            color: #005f7a;
            text-transform: uppercase;
            min-height: 1em;
        }
        #planMsg.ok    { color: #00d4ff; }
        #planMsg.error { color: #ff6b6b; }
    </style>
</head>
<body>

    <h1>Nokia</h1>

    <div class="mode-badge">Control mode: <span id="modeLabel">detecting...</span></div>

    <div class="status-box">
        <div class="status-item">
            <div class="val" id="dispX">50</div>
            <div class="label">X Tilt</div>
        </div>
        <div class="status-item">
            <div class="val" id="dispY">50</div>
            <div class="label">Y Tilt</div>
        </div>
        <div class="status-item">
            <div class="val" id="dispLat">0</div>
            <div class="label">Latency ms</div>
        </div>
        <div class="status-item">
            <div class="val" id="dispJitter">0</div>
            <div class="label">Jitter ms</div>
        </div>
    </div>

    <div class="card">
        <h2>Network Settings</h2>
        <div class="slider-row">
            <div class="slider-label">
                <span>Latency</span>
                <span class="slider-value"><span id="latVal">0</span> ms</span>
            </div>
            <input type="range" min="0" max="1000" value="0" id="latency">
        </div>
        <div class="slider-row">
            <div class="slider-label">
                <span>Jitter</span>
                <span class="slider-value">±<span id="jitterVal">0</span> ms</span>
            </div>
            <input type="range" min="0" max="500" value="0" id="jitter">
        </div>
    </div>

    <div class="graph-card">
        <h2>Live Network Delay Graph</h2>
        <canvas id="latencyChart"></canvas>
    </div>

    <div class="card">
        <h2>Live Camera Feed</h2>
        <div class="video-container" id="videoContainer">
            <img src="/video_feed" id="streamImg" alt="camera">
            <canvas id="overlayCanvas" width="640" height="480"></canvas>
        </div>
    </div>

    <div class="card">
        <h2>AI Setup</h2>
        <div class="setup-status">
            <div>Start:<span class="val" id="startStatus">—</span></div>
            <div>End:<span class="val" id="endStatus">—</span></div>
            <div>Path:<span class="val" id="pathStatus">—</span></div>
        </div>
        <div class="setup-buttons">
            <button class="nokia-btn" id="pickStartBtn" onclick="pickMode('start')">Pick Start</button>
            <button class="nokia-btn" id="pickEndBtn"   onclick="pickMode('end')">Pick End</button>
            <button class="nokia-btn" id="planBtn"      onclick="planPath()">Plan Path</button>
            <button class="nokia-btn secondary" id="clearBtn" onclick="clearPlan()">Reset</button>
        </div>
        <div id="planMsg">Mark start (arrow) and end (*), then plan path</div>
    </div>

    <div class="card">
        <h2>AI Mode</h2>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="letter-spacing: 2px; font-size: 0.9em;">Let AI play the maze</span>
            <button id="aiBtn" class="nokia-btn" onclick="toggleAI()">Enable AI</button>
        </div>
        <div id="aiStatus" style="
            margin-top: 15px;
            font-size: 0.75em;
            letter-spacing: 2px;
            color: #005f7a;
            text-transform: uppercase;
        ">AI is off</div>
    </div>

    <div id="gyro-status"></div>

<script>
    let isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);
    let x = 50, y = 50;
    let currentLatency = 0;
    let currentJitter = 0;

    document.getElementById("modeLabel").innerText = isMobile ? "Phone Gyroscope" : "Keyboard Arrows";

    // -------- chart setup --------
    const ctx = document.getElementById("latencyChart").getContext("2d");
    const maxPoints = 30;
    const labels = Array(maxPoints).fill("");
    const latencyData = Array(maxPoints).fill(0);
    const actualDelayData = Array(maxPoints).fill(0);

    const chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [
                {
                    label: "Latency (ms)",
                    data: latencyData,
                    borderColor: "#00d4ff",
                    backgroundColor: "#00d4ff11",
                    borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true
                },
                {
                    label: "Actual Delay with Jitter (ms)",
                    data: actualDelayData,
                    borderColor: "#ff6b6b",
                    backgroundColor: "#ff6b6b11",
                    borderWidth: 2, pointRadius: 0, tension: 0.4, fill: true
                }
            ]
        },
        options: {
            animation: false,
            scales: {
                x: { display: false },
                y: { min: 0, ticks: { color: "#005f7a" }, grid: { color: "#00d4ff11" } }
            },
            plugins: { legend: { labels: { color: "#00d4ff", font: { size: 10 } } } }
        }
    });

    function updateGraph() {
        const jitter = currentJitter;
        const randomJitter = Math.floor(Math.random() * (jitter * 2 + 1)) - jitter;
        const actualDelay = Math.max(0, currentLatency + randomJitter);
        latencyData.push(currentLatency); latencyData.shift();
        actualDelayData.push(actualDelay); actualDelayData.shift();
        chart.update();
    }
    setInterval(updateGraph, 500);

    // -------- manual tilt sending --------
    function sendTilt() {
        document.getElementById("dispX").innerText = Math.round(x);
        document.getElementById("dispY").innerText = Math.round(y);
        fetch("/update", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ x: Math.round(x), y: Math.round(y) })
        });
    }

    function sendSettings() {
        const latency = document.getElementById("latency").value;
        const jitter  = document.getElementById("jitter").value;
        currentLatency = parseInt(latency);
        currentJitter  = parseInt(jitter);
        document.getElementById("latVal").innerText    = latency;
        document.getElementById("jitterVal").innerText = jitter;
        document.getElementById("dispLat").innerText    = latency;
        document.getElementById("dispJitter").innerText = jitter;
        fetch("/settings", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ latency: parseInt(latency), jitter: parseInt(jitter) })
        });
    }

    document.getElementById("latency").addEventListener("input", sendSettings);
    document.getElementById("jitter").addEventListener("input", sendSettings);

    // -------- gyroscope (phone) --------
    if (isMobile) {
        if (typeof DeviceOrientationEvent !== "undefined" &&
            typeof DeviceOrientationEvent.requestPermission === "function") {
            document.getElementById("gyro-status").innerText = "Tap screen to enable gyroscope";
            document.body.addEventListener("click", () => {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === "granted") {
                        document.getElementById("gyro-status").innerText = "Gyroscope active";
                        startGyro();
                    }
                });
            }, { once: true });
        } else {
            startGyro();
        }
    }

    function startGyro() {
        window.addEventListener("deviceorientation", (e) => {
            x = Math.min(100, Math.max(0, (e.gamma + 45) * (100 / 90)));
            y = Math.min(100, Math.max(0, (e.beta  + 45) * (100 / 90)));
            sendTilt();
        });
    }

    // -------- arrow keys (laptop) --------
    if (!isMobile) {
        const keys = {};
        document.addEventListener("keydown", e => keys[e.key] = true);
        document.addEventListener("keyup",   e => keys[e.key] = false);

        setInterval(() => {
            let moved = false;
            if (keys["ArrowLeft"])  { x = Math.max(0,   x - 2); moved = true; }
            if (keys["ArrowRight"]) { x = Math.min(100, x + 2); moved = true; }
            if (keys["ArrowUp"])    { y = Math.max(0,   y - 2); moved = true; }
            if (keys["ArrowDown"])  { y = Math.min(100, y + 2); moved = true; }
            if (moved) sendTilt();
        }, 50);
    }

    // =====================================================================
    // AI SETUP — click to mark start/end, plan path, enable AI
    // =====================================================================

    const videoContainer = document.getElementById("videoContainer");
    const overlayCanvas  = document.getElementById("overlayCanvas");
    const octx           = overlayCanvas.getContext("2d");

    let clickMode = null;           // "start" | "end" | null
    let startXY   = null;
    let endXY     = null;
    let pathPlanned = false;

    function pickMode(which) {
        clickMode = (clickMode === which) ? null : which;
        videoContainer.classList.toggle("picking", clickMode !== null);
        document.getElementById("pickStartBtn").classList.toggle("active", clickMode === "start");
        document.getElementById("pickEndBtn").classList.toggle  ("active", clickMode === "end");
    }

    overlayCanvas.addEventListener("click", async (e) => {
        if (!clickMode) return;
        const rect = overlayCanvas.getBoundingClientRect();
        // convert CSS px back to the canvas's 640x480 intrinsic coords
        const cx = Math.round((e.clientX - rect.left) * (overlayCanvas.width  / rect.width));
        const cy = Math.round((e.clientY - rect.top)  * (overlayCanvas.height / rect.height));

        if (clickMode === "start") { startXY = [cx, cy]; }
        else                       { endXY   = [cx, cy]; }

        pickMode(null);   // exit pick mode after one click
        redrawOverlay();
        updateSetupStatus();

        if (startXY && endXY) {
            await fetch("/set_start_end", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ start: startXY, end: endXY })
            });
        }
    });

    function redrawOverlay() {
        octx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        if (startXY) {
            octx.strokeStyle = "#00d4ff"; octx.lineWidth = 4;
            octx.shadowBlur = 15; octx.shadowColor = "#00d4ff";
            octx.beginPath(); octx.arc(startXY[0], startXY[1], 14, 0, 2*Math.PI); octx.stroke();
            octx.beginPath(); octx.moveTo(startXY[0] - 8, startXY[1]); octx.lineTo(startXY[0] + 8, startXY[1]); octx.stroke();
            octx.beginPath(); octx.moveTo(startXY[0], startXY[1] - 8); octx.lineTo(startXY[0], startXY[1] + 8); octx.stroke();
        }
        if (endXY) {
            octx.strokeStyle = "#ff6b6b"; octx.lineWidth = 4;
            octx.shadowBlur = 15; octx.shadowColor = "#ff6b6b";
            octx.beginPath(); octx.arc(endXY[0], endXY[1], 14, 0, 2*Math.PI); octx.stroke();
            octx.beginPath(); octx.moveTo(endXY[0] - 8, endXY[1] - 8); octx.lineTo(endXY[0] + 8, endXY[1] + 8); octx.stroke();
            octx.beginPath(); octx.moveTo(endXY[0] + 8, endXY[1] - 8); octx.lineTo(endXY[0] - 8, endXY[1] + 8); octx.stroke();
        }
        octx.shadowBlur = 0;
    }

    function updateSetupStatus() {
        document.getElementById("startStatus").innerText =
            startXY ? `${startXY[0]}, ${startXY[1]}` : "—";
        document.getElementById("endStatus").innerText =
            endXY   ? `${endXY[0]}, ${endXY[1]}`     : "—";
        document.getElementById("pathStatus").innerText =
            pathPlanned ? "planned" : "—";
    }

    function setPlanMsg(text, cls) {
        const el = document.getElementById("planMsg");
        el.innerText = text;
        el.className = cls || "";
    }

    async function planPath() {
        if (!startXY || !endXY) {
            setPlanMsg("Set start and end first", "error");
            return;
        }
        setPlanMsg("Planning...", "");
        try {
            const r = await fetch("/plan_path", { method: "POST" });
            const j = await r.json();
            if (j.status === "ok") {
                pathPlanned = true;
                updateSetupStatus();
                setPlanMsg(j.message || "Path planned", "ok");
            } else {
                pathPlanned = false;
                updateSetupStatus();
                setPlanMsg(j.message || "Planning failed", "error");
            }
        } catch (e) {
            setPlanMsg("Request failed", "error");
        }
    }

    async function clearPlan() {
        startXY = null; endXY = null; pathPlanned = false;
        clickMode = null;
        videoContainer.classList.remove("picking");
        document.getElementById("pickStartBtn").classList.remove("active");
        document.getElementById("pickEndBtn").classList.remove("active");
        redrawOverlay();
        updateSetupStatus();
        setPlanMsg("Reset — mark start and end", "");
        await fetch("/clear_plan", { method: "POST" });
        // also turn AI off if it was on
        if (aiActive) toggleAI();
    }

    // =====================================================================
    // AI toggle (existing, with friendlier error handling)
    // =====================================================================

    let aiActive = false;

    function toggleAI() {
        const newState = !aiActive;
        const btn    = document.getElementById("aiBtn");
        const status = document.getElementById("aiStatus");

        fetch("/ai", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ enable: newState })
        })
        .then(res => res.json().then(data => ({ ok: res.ok, data })))
        .then(({ ok, data }) => {
            if (ok && data.status === "ok") {
                aiActive = newState;
                btn.innerText = aiActive ? "Disable AI" : "Enable AI";
                btn.classList.toggle("active", aiActive);
                status.innerText = aiActive ? "AI is playing..." : "AI is off";
                status.style.color = aiActive ? "#00d4ff" : "#005f7a";
            } else {
                setPlanMsg(data.message || "AI could not start", "error");
            }
        })
        .catch(() => setPlanMsg("AI request failed", "error"));
    }
</script>
</body>
</html>
